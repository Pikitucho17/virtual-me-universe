<style>

// pairingSessions/{code}.profile -> the game's profile model
function mapPassport(p){
  const stats={};
  (p.stats||[]).forEach(s=>{ const k=(s.key||s.name||'').toString().toUpperCase().slice(0,3);
    if(k) stats[k]=[Math.round(s.abilityNow||0), Math.round(s.legacy||0)]; });
  STAT_ORDER.forEach(k=>{ if(!stats[k]) stats[k]=[50,50]; });
  const apps=(p.connectedApps||[]).filter(a=>APP_LABEL[a]||APP_SKILL[a]);
  const skills=[...new Set(apps.map(a=>APP_SKILL[a]).filter(Boolean))];
  return { name:p.name||"You", stats, apps, skills, real:true };
}

function listenForPassport(){
  if(!FDB) return; // offline / no firebase -> use Preview instead
  try{ if(PAIR_UNSUB) PAIR_UNSUB(); }catch(e){}
  try{
    PAIR_UNSUB = FDB.collection('pairingSessions').doc(SESSION).onSnapshot(snap=>{
      if(snap && snap.exists){ const d=snap.data();

          try{ if(PAIR_UNSUB) PAIR_UNSUB(); }catch(e){}

/* ============ ENGINE ============ */
let S = { profile:null, key:null, i:0, recap:[], flag:null, unique:0, wins:0, rolls:0, care:null };
const app = document.getElementById('app');

function statDot(stat,threshold){
  const [now,leg]=S.profile.stats[stat];
  if(now>=threshold) return {cls:"b-green",dot:"var(--green)",tag:`${stat} ${now} ✓`};
  if(leg>=threshold) return {cls:"b-amber",dot:"var(--amber)",tag:`${stat} ${now} · rusty (Legacy ${leg})`};
  return {cls:"b-red",dot:"var(--red)",tag:`${stat} ${now} ✗`};
}

/* ---- dice system: stats + proven skills raise the odds (text-only d20) ---- */
const SKILL_STAT = { electrical:"INT", programming:"INT", mathematics:"INT", portuguese:"INT", latin:"INT", techwriting:"INT", firstaid:"WIS", negotiation:"CHA", teaching:"CHA", welding:"DEX", carpentry:"DEX", vehicle:"DEX" };
function statMod(v){ return Math.round((v-50)/6); }
function deriveDC(th){ return Math.round((th-50)/6)+13; }
function checkParams(o){
  const stat = o.stat || SKILL_STAT[o.skill] || "INT";
  const [now,leg] = (S.profile.stats[stat] || [50,50]);
  const mod = statMod(now);
  const proven = o.skill && S.profile.skills.includes(o.skill);
  const skillBonus = proven ? 8 : 0;
  const legBonus = (leg>now) ? Math.min(2, Math.round((leg-now)/12)) : 0;
  const dc = o.threshold ? deriveDC(o.threshold) : (o.skill ? 11 : 13);
  const needed = dc - mod - skillBonus - legBonus;
  const p = Math.max(0, Math.min(1, (21-needed)/20));
  return { stat, now, leg, mod, proven, skillBonus, legBonus, dc, p };
}
function oddsText(p){
  if(p>=0.8) return {t:"strong odds", c:"var(--green)"};
  if(p>=0.55) return {t:"fair odds", c:"#7fe9ff"};
  if(p>=0.3) return {t:"risky", c:"var(--amber)"};
  return {t:"long shot", c:"var(--red)"};
}

function hud(){
  const p=S.profile;
  const stats=STAT_ORDER.map(k=>{
    const [now,leg]=p.stats[k];
    return `<div class="stat"><div class="k">${k}</div><div class="now">${now}</div><div class="leg">LEG ${leg}</div></div>`;
  }).join("");
  const skillChips=(p.skills||[]).map(s=>`<span class="chip skill">${SKILL_LABEL[s]||s}</span>`).join("");
  const appChips=(p.apps||[]).map(a=>`<span class="chip">${APP_LABEL[a]||a} ✓</span>`).join("");
  return `<div class="hud">
    <div class="hud-top"><div class="hud-name">${p.name}<span>${p.real?'live from Virtual Me':'sample profile'}</span></div>
    <div class="pill">read-only · the game never changes these</div></div>
    <div class="stats">${stats}</div>
    <div class="hud-skills">${appChips}${skillChips}</div>
  </div>`;
}

function renderStart(){

  app.innerHTML=`
    <div class="brand"><span onclick="renderConnect()" style="cursor:pointer">‹ CONNECT</span> &nbsp;·&nbsp; <b>ATLAS · preview mode</b></div>
    <h1>The passage reads you first.</h1>
    <p class="sub">Every skill you have truly proven, and every strength you carry today, becomes a door only you can walk.
    This is a 2‑minute sketch of the idea. Pick a sample self and watch the same station open differently for each one.</p>
    <div class="card">
      <div class="scene-title">Choose who walks in</div>
      <div class="selves">${selves}</div>
    </div>
    <div class="foot">Prototype · sample profiles stand in for a real Virtual Me. The real game reads your actual proven self.</div>`;
}

function pick(key){ startRun(PROFILES[key], key); }

function startRun(profile, key){
  S.key=key; S.profile=profile; S.i=0; S.recap=[]; S.flag=null;
  S.unique=0; S.wins=0; S.rolls=0; S.care=null;
  app.innerHTML=`<div class="brand"><b>ATLAS</b> &nbsp;·&nbsp; reading your passport</div>
    <div class="card"><div class="scan" id="scan"></div></div>`;
  const proven = (profile.skills&&profile.skills.length) ? profile.skills.map(s=>SKILL_LABEL[s]||s).join(", ")
    : (profile.apps&&profile.apps.length) ? profile.apps.map(a=>APP_LABEL[a]||a).join(", ") : "your record";
  const lines=[`> READING RECORD: ${profile.name}${profile.real?' · live from Virtual Me':''}`,`> mapping 6 capacities · Ability Now + Legacy`,
    `> lighting proven skills: ${proven}`,`> building a passage only you can walk...`];
  let n=0; const el=document.getElementById('scan');
  const t=setInterval(()=>{ el.innerHTML+=(n?"<br>":"")+lines[n]; n++;
    if(n>=lines.length){clearInterval(t); setTimeout(renderScene,650);} },430);
}

function renderScene(){
  const sc=SCENES[S.i];
  const opts=sc.options.map((o,idx)=>{
    if(o.locked){
      return `<button class="opt" disabled>
        <span class="badge b-lock"><span class="dot" style="background:var(--dim)"></span>🔒 ${o.needs} — not in your record</span>
        <span>${o.text}</span></button>`;
    }
    if(o.type==="skill" && !S.profile.skills.includes(o.skill)) return "";
    let badge="";
    if(o.type==="skill" || o.type==="stat"){
      const cp=checkParams(o); const od=oddsText(cp.p);
      const lead = o.type==="skill" ? `PROVEN: ${SKILL_LABEL[o.skill]} · ` : "";
      badge=`<span class="badge" style="color:${od.c}"><span class="dot" style="background:${od.c}"></span>${lead}${cp.stat} ${cp.now} · ${od.t} · ${Math.round(cp.p*100)}%</span>`;
    } else if(o.type==="choice"){
      badge=`<span class="badge b-choice"><span class="dot" style="background:var(--violet)"></span>A choice — nothing forces your hand</span>`;
    } else {
      badge=`<span class="badge" style="color:var(--dim)"><span class="dot" style="background:var(--dim)"></span>Always available</span>`;
    }
    return `<button class="opt" onclick="choose(${idx})">${badge}<span>${o.text}</span></button>`;
  }).join("");
  app.innerHTML=`${hud()}
    <div class="card fade">
      <div class="scene-title">${sc.title}</div>
      <div class="scene-text">${sc.text}</div>
      <div class="opts">${opts}</div>
    </div>
    <div class="foot">Situation ${S.i+1} of ${SCENES.length} · your odds are set by your real profile above · same trial for everyone</div>`;
  window.scrollTo({top:0,behavior:"smooth"});
}

function choose(idx){
  const o=SCENES[S.i].options[idx];
  // scene II is the survivor: remember HOW you handled them (the ending remembers)
  const isSurvivor = S.i===1;
  if(o.type==="always" || o.type==="choice"){
    if(o.flag) S.flag=o.flag;
    if(isSurvivor) S.care = "rough";
    S.recap.push(o.recap);
    showOutcome(o, "", o.ok, o.type==="choice" ? "var(--violet)" : "var(--green)");
    return;
  }
  if(o.type==="skill") S.unique++;   // a door that existed ONLY because of your proven record
  const cp=checkParams(o);
  const roll=1+Math.floor(Math.random()*20);
  const total=roll+cp.mod+cp.skillBonus+cp.legBonus;
  const success = total>=cp.dc;
  S.rolls++; if(success) S.wins++;
  if(isSurvivor) S.care = success ? (o.skill==="firstaid" ? "expert" : "okay") : "rough";
  const fmt=(n)=>(n>=0?"+":"")+n;
  const parts=[`${fmt(cp.mod)} ${cp.stat} ${cp.now}`];
  if(cp.skillBonus) parts.push(`+${cp.skillBonus} ${SKILL_LABEL[o.skill]}`);
  if(cp.legBonus) parts.push(`+${cp.legBonus} instinct`);
  const outcome = success ? o.ok : (o.fail || "It doesn't go your way — but the passage still lets you through, the hard way.");
  const mood = success ? "var(--green)" : "var(--red)";
  S.recap.push(success ? o.recap : ("struggled at "+SCENES[S.i].title.replace(/^[^·]*·\s*/,"")));

  // ---- the ROLL, animated: numbers tumble, then the die settles ----
  app.innerHTML=`${hud()}
    <div class="card fade">
      <div class="scene-title">${SCENES[S.i].title}</div>
      <div class="rollline" id="rolling">🎲 d20 → <span id="die" style="font-size:16px">?</span> &nbsp; ${parts.join(" &nbsp; ")} &nbsp; vs DC ${cp.dc}</div>
      <div class="scene-text" style="color:var(--dim)">The die is rolling…</div>
    </div>`;
  window.scrollTo({top:0,behavior:"smooth"});
  const die=document.getElementById('die');
  let n=0;
  const t=setInterval(()=>{
    die.textContent=1+Math.floor(Math.random()*20); n++;
    if(n>=14){ clearInterval(t);
      const rollLine=`🎲 d20 → ${roll} &nbsp; ${parts.join(" &nbsp; ")} &nbsp; = ${total} &nbsp; vs DC ${cp.dc} &nbsp; — ${success?"SUCCESS":"MISS"}`;
      showOutcome(o, rollLine, outcome, mood);
    }
  },70);
}

function showOutcome(o, rollLine, outcome, mood){
  app.innerHTML=`${hud()}
    <div class="card fade">
      <div class="scene-title">${SCENES[S.i].title}</div>
      ${rollLine?`<div class="rollline" style="color:${mood};border-color:${mood}">${rollLine}</div>`:""}
      <div class="scene-text" style="border-left:3px solid ${mood};padding-left:14px">${outcome}</div>
      <div class="opts"><button class="primary" onclick="next()">${S.i<SCENES.length-1?"Continue →":"See how you walked it"}</button></div>
    </div>`;
  window.scrollTo({top:0,behavior:"smooth"});
}

function next(){ S.i++; if(S.i<SCENES.length) renderScene(); else renderEnd(); }

function renderEnd(){
  const items=S.recap.map(r=>`<li>You ${r}.</li>`).join("");
  const careLine = S.care==="expert" ? "The survivor walks out beside you, arm properly dressed — they'll tell people a stranger knew exactly what to do."
    : S.care==="okay" ? "The survivor makes it out, pale but steady — your improvised care held."
    : "The survivor makes it out, barely — they'll carry that scar, and so will you.";
  const line = (S.flag==="wise"
    ? "You spent your own way out to bring someone else home. The Atlas logs that too — the choices that cost you are the ones it remembers longest."
    : "You took the fast way out. The Atlas doesn't judge it — it just records who you were when it counted.")
    + " " + careLine;
  const tally = `<p class="scene-text" style="margin-top:10px"><b style="color:var(--cyan)">${S.unique}</b> door${S.unique===1?"":"s"} on this run existed <b>only because of your proven record</b> · rolls won: <b>${S.wins}/${S.rolls}</b></p>`;
  app.innerHTML=`${hud()}
    <div class="card fade">
      <div class="scene-title">The passage, as only ${S.profile.name} could walk it</div>
      <ul class="recap">${items}</ul>
      ${tally}
      <p class="scene-text" style="color:var(--dim)">${line}</p>
      <div class="teaser">
        <p class="scene-text"><b>That was a 2‑minute sketch of you.</b> The real Virtual Me reads your whole proven life —
        every skill you've verified, your real strengths today, and the ones you've let go rusty — and it keeps growing as you do.
        Imagine every game you play opening its doors around the person you've actually become.</p>
        <p class="scene-text" style="color:var(--cyan)">You are the save file. Play anywhere as yourself.</p>
        <details><summary>What is Virtual Me?</summary>
          <p class="scene-text" style="margin-top:10px">Virtual Me turns your real life into a portable game character: six real‑world‑calibrated
          stats and a universe of skills you unlock by proving real competence. This game read a stand‑in profile — with a real one,
          every door above would be yours, earned.</p></details>
      </div>
      <div class="opts" style="margin-top:16px;flex-direction:row;flex-wrap:wrap;gap:10px">
        <button class="primary" onclick="startRun(S.profile, S.key)">↺ Play again</button>
        <button class="ghost" onclick="renderConnect()">Connect a different passport</button>
      </div>
    </div>
    <div class="foot">Prototype · the point: the same station, three different people, three different passages.</div>`;
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ============ starfield ============ */
(function(){
  const c=document.getElementById('stars'),x=c.getContext('2d');
  function size(){c.width=innerWidth;c.height=innerHeight;}
  size();addEventListener('resize',size);
  const stars=Array.from({length:130},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.4+.2,a:Math.random()}));
  (function loop(){ x.clearRect(0,0,c.width,c.height);
    for(const s of stars){ s.a+=(Math.random()-.5)*.05; s.a=Math.max(.15,Math.min(1,s.a));
      x.globalAlpha=s.a; x.fillStyle=Math.random()<.5?'#bcd4ff':'#7fe9ff';
      x.beginPath();x.arc(s.x*c.width,s.y*c.height,s.r,0,7);x.fill(); }
    requestAnimationFrame(loop); })();
})();

renderConnect();
</script>
</body>
</html>
